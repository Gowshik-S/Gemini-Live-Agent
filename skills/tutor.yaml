# Tutor Skill
# Educational tools for quizzes, progress tracking, and concept explanation.

name: tutor
description: "Educational tutoring with quizzes, progress tracking, and explanations"
tools:
  - generate_quiz
  - track_progress
  - explain_concept
  - search_notes
  - save_note
  - get_notes
system_instruction_append: >
  You are an educational tutor. Use the Socratic method — ask guiding
  questions rather than giving direct answers. Generate quizzes to test
  understanding. Track student progress and adapt difficulty accordingly.
  Save learning milestones as notes.
config:
  default_difficulty: "intermediate"
  socratic_mode: true
