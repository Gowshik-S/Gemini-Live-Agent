# Rio — Your Virtual Friend & Assistant
# User configuration file
# All values here can be overridden; sensible defaults exist in local/config.py

rio:
  # Agent identity — customise to your liking
  agent_name: "Rio"                       # Display name (shown in UI, voice greetings)
  agent_tagline: "Your Virtual Friend & Assistant"  # Short description
  # Personality presets: "assistant" | "tutor" | "customer_care" | "developer"
  # Or write your own in the system_instruction override below.
  agent_role: "assistant"

  # WebSocket URL for the Rio cloud backend
  # Change to your Cloud Run URL after deployment
  cloud_url: "ws://localhost:8080/ws/rio/live"

  # Backend mode: "direct" uses Gemini Live API directly for lowest latency
  backend: "direct"

  # Session mode: "live" for Live API bidirectional audio, "text" for text-only fallback
  session_mode: "live"

  # Google Cloud Platform — $300 free credits
  # Set use_vertex_ai: true to route through Vertex AI (production, billing, quotas)
  # Set use_vertex_ai: false to use Gemini API directly (development, simpler)
  gcp:
    use_vertex_ai: false
    project_id: ""                  # Your GCP project ID (e.g., "my-project-123")
    location: "us-central1"         # Vertex AI region
    # To enable Vertex AI:
    #   1. Go to console.cloud.google.com → create/select project
    #   2. Enable Vertex AI API + Generative Language API
    #   3. Set project_id above (or GOOGLE_CLOUD_PROJECT env var)
    #   4. Set use_vertex_ai: true (or GOOGLE_GENAI_USE_VERTEXAI=True env var)
    #   5. Run: gcloud auth application-default login

  # Audio capture / playback settings (Layer 1+)
  audio:
    sample_rate: 16000        # Hz — matches Gemini Live API expectation
    block_size: 320           # samples per chunk (~20ms at 16kHz, was 1600/100ms)
    input_device: null        # null = system default mic
    output_device: null       # null = system default speaker
    latency: "low"            # "low" for voice assistant, "high" for stability
    use_wasapi: true          # Enable WASAPI low-latency on Windows

  # Keyboard shortcuts (Layer 1+)
  hotkeys:
    push_to_talk: "f2"
    screenshot: "f3"
    toggle_proactive: "f4"
    screen_mode: "f5"
    live_mode: "f6"

  # Voice Activity Detection (Day 5)
  vad:
    enabled: true
    threshold: 0.5              # Silero probability threshold (0.0-1.0)

  # Screen/vision capture settings (Layer 2+)
  vision:
    fps: 0.33                 # ~1 frame every 3 seconds
    quality: 85               # JPEG quality (0-100)
    resize_factor: 0.75       # downscale factor before sending
    default_mode: "on_demand" # on_demand | autonomous (autonomous = always watching screen + auto-capture after actions)

  # Struggle detection settings (Layer 4+)
  struggle:
    enabled: true
    threshold: 0.85           # confidence threshold to trigger proactive help (extreme conservatism)
    cooldown_seconds: 300     # minimum seconds between proactive interventions
    decline_cooldown: 600     # cooldown after user declines help
    demo_mode: false          # if true, lower thresholds for demonstration

  # Local memory / RAG settings (Layer 5+)
  memory:
    db_path: "./data/memory"
    max_recall: 5             # max memory entries to inject into context

  # Model selection & fallback
  models:
    primary: "gemini-2.5-flash"
    live: "gemini-2.5-flash-native-audio-latest"
    secondary: "gemini-2.5-pro-preview-03-25"
    computer_use: "gemini-2.5-computer-use-preview-10-2025"
    imagen: "imagen-3"
    pro_rpm_budget: 5
    fallback_chain:                   # models tried after primary fails
      - "gemini-2.5-flash"
    cooldown_seconds: 60.0            # seconds before retrying a failed model
    timeout_seconds: 30.0             # per-request timeout

  # Logging configuration
  logging:
    log_dir: "./logs"                 # directory for structured log files
    verbose: false                    # show DEBUG-level output in console
    max_files: 7                      # log rotation — keep last N days         # max requests-per-minute to the pro model
  # Skills configuration (Customer Care + Tutor)
  skills:
    customer_care:
      enabled: true
      ticket_dir: "./rio_tickets"           # where ticket JSON files are stored
      auto_escalate_after: 300              # seconds before auto-escalation
      default_priority: "medium"            # low | medium | high | critical
    tutor:
      enabled: true
      progress_dir: "./rio_progress"        # where student progress is stored
      default_difficulty: "intermediate"    # beginner | novice | intermediate | advanced
      quiz_num_questions: 5                 # default number of quiz questions
      socratic_mode: true                   # use Socratic method (questions, not answers)

  # Multi-agent orchestration
  # Each agent specializes in a task type and uses the best model for it.
  # The orchestrator auto-selects the right agent based on task content.
  agents:
    task_executor:
      enabled: true
      model: "gemini-2.5-flash"             # Fast, tool-capable model for computer tasks
      description: "Executes computer tasks: opening apps, clicking, typing, file operations"
      tools: "all"                           # all | screen | dev | memory
      max_iterations: 25
    code_agent:
      enabled: true
      model: "gemini-2.5-flash"             # Strong coding model
      description: "Code analysis, debugging, file reading/writing, refactoring"
      tools: "dev"                           # read_file, write_file, patch_file, run_command
      max_iterations: 15
    research_agent:
      enabled: true
      model: "gemini-2.5-flash"             # Good reasoning model
      description: "Research, analysis, explanations, complex reasoning"
      tools: "memory"                        # search_notes, save_note, get_notes
      max_iterations: 10
    creative_agent:
      enabled: false
      model: "gemini-2.5-flash"             # Model for image/video generation
      description: "Image and video generation using Imagen 3 and Veo 2"
      tools: "creative"                      # generate_image, generate_video
      max_iterations: 5