rio:
  agent_name: Rio
  agent_role: assistant
  agent_tagline: Your Virtual Friend & Assistant
  agents:
    code_agent:
      enabled: true
      max_iterations: 15
      model: gemini-3-flash-preview
      tools: dev
    creative_agent:
      enabled: true
      max_iterations: 5
      model: ''
      tools: creative
    research_agent:
      enabled: true
      max_iterations: 10
      model: gemini-2.5-pro-preview-06-05
      tools: memory
    task_executor:
      enabled: true
      max_iterations: 25
      model: gemini-3-flash-preview
      tools: all
  audio:
    block_size: 320
    input_device: null
    latency: low
    output_device: null
    sample_rate: 16000
    use_wasapi: true
  backend: direct
  browser:
    default_browser: auto
    default_profile: rio
  cloud_url: ws://localhost:8080/ws/rio/live
  filesystem:
    enabled: true
    read_paths:
    - .
    write_paths:
    - .
  gcp:
    location: global
    project_id: rio-agent-45
    use_vertex_ai: true
  global_deny_tools: []
  hotkeys:
    live_mode: f6
    push_to_talk: f2
    screen_mode: f5
    screenshot: f3
    toggle_proactive: f4
  logging:
    log_dir: ./logs
    max_files: 7
    verbose: false
  mcp_servers: []
  memory:
    db_path: ./data/memory
    max_recall: 5
  models:
    computer_use: gemini-3-flash-preview
    cooldown_seconds: 60.0
    fallback_chain:
    - gemini-2.5-flash
    imagen: imagen-4
    live: gemini-2.5-flash-native-audio-latest
    primary: gemini-3-flash-preview
    pro_rpm_budget: 5
    secondary: gemini-3-pro-preview
    timeout_seconds: 30.0
  notifications:
    telegram:
      bot_token: ''
      chat_id: ''
  orchestrator:
    composite_routing:
      complex_model: gemini-3.1-pro-preview
      complexity_keywords:
      - analyze
      - architecture
      - security
      - tradeoff
      - research
      - refactor
      - optimize
      - plan
      enabled: true
      simple_max_words: 22
      simple_model: gemini-3-flash-preview
    heartbeat_interval_seconds: 5
    loop_detection:
      stop_at: 4
      strategy_at: 3
      warning_at: 2
    prompt_fragments:
      base: ''
      compaction: ''
      routing: ''
      safety: ''
      verification: ''
    semantic_compaction:
      high_value_keywords:
      - error
      - failed
      - decision
      - todo
      - retry
      - security
      - quota
      keep_middle_items: 8
    session_persist_interval_seconds: 3
    tool_policy:
      cost_points:
        generate_video: 6
        gmail_send: 3
        run_command: 4
        start_process: 5
      default_per_minute: 20
      max_calls_per_task: 120
      max_cost_points_per_task: 200
      per_tool_per_minute:
        gmail_send: 6
        run_command: 8
        smart_click: 30
    tool_timeout_seconds: 120
  session_mode: live
  skills:
    customer_care:
      auto_escalate_after: 300
      default_priority: medium
      enabled: true
      ticket_dir: ./rio_tickets
    tutor:
      default_difficulty: intermediate
      enabled: true
      progress_dir: ./rio_progress
      quiz_num_questions: 5
      socratic_mode: true
  struggle:
    cooldown_seconds: 300
    decline_cooldown: 600
    demo_mode: false
    enabled: true
    threshold: 0.85
  ui_navigator:
    analyze_every_n_frames: 3
    confidence_threshold: 0.85
    enabled: false
    fps: 10.0
    model: gemini-2.5-flash
  vad:
    enabled: true
    threshold: 0.5
  vision:
    default_mode: on_demand
    fps: 0.33
    quality: 85
    resize_factor: 0.75
  voice:
    default_name: Puck
    plugin:
      config:
        provider: google-prebuilt
        voice_name: Puck
      enabled: false
      factory: create_plugin
      module: rio.cloud.voice_plugins.custom_voice
  workspace_cli:
    binary: workspace-cli
